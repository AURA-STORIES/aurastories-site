<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Kaviya 💌</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui;
      color: #334155;
      background: radial-gradient(circle at top, #fff7fb 0%, #ffe4ee 35%, #fffafc 100%);
    }

    .app {
      min-height: 100vh;
      padding: 16px;
    }

    .center-shell, .page-shell {
      max-width: 700px;
      margin: auto;
      padding: 30px 0;
    }

    .card, .letter-card {
      background: rgba(255,255,255,0.9);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(244,114,182,0.2);
    }

    .title {
      font-size: 28px;
      text-align: center;
    }

    .input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ccc;
      margin-top: 16px;
    }

    .button {
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #f43f5e;
      color: white;
      cursor: pointer;
    }

    .name {
      font-size: 30px;
      margin-bottom: 10px;
    }

    .section { margin-bottom: 18px; }

    .greeting {
      font-size: 22px;
      font-weight: bold;
    }

    .friend-box {
      background: #ffe4e6;
      padding: 20px;
      border-radius: 16px;
      text-align: center;
    }

    .friend-q {
      font-size: 24px;
      font-weight: bold;
      color: #e11d48;
    }

    .blessing {
      text-align: center;
      margin-top: 20px;
      font-size: 20px;
    }

    .phone {
      margin-top: 12px;
      font-size: 16px;
      color: #475569;
    }

  </style>
</head>

<body>
<div class="app" id="app"></div>

<script>

const content = {
  greeting: "Hi Kaviya 😊",
  intro: "Ungalukku ennai pudichiruka illaya nu theriyadhu… but en manasula irukkaradhu share pannalam nu thonuchu.",
  spark: "Ungaloda photo patha udane oru calm feeling vandhuduchu.",
  meet: "Adhe mindset-oda dhaan ungala paaka vandhen.",
  talk: "But namma pesave illa 😀",
  shy: "Life-la first time naan konjam blush-a feel panninen 🥰",
  promise: "Big promises panna maaten… but care pannuvan.",
  learn: "Life la nanum learning phase la tha irruken.",
  okay: "Nambikkai irundha… oru 'okay' sollunga.",
  friend: "I'm really looking for a good friend.",
  friendQ: "Will you be my friend?",
  blessing: "🦚 🙏 Muruga 🙏 🦚"
};

function renderLogin() {
  const app = document.getElementById("app");

  app.innerHTML = `
    <div class="center-shell">
      <div class="card">
        <h2 class="title">🔒 A small message</h2>
        <input class="input" id="pwd" placeholder="Enter password"/>
        <button class="button" onclick="check()">Open</button>
        <p id="error"></p>
      </div>
    </div>
  `;
}

function check() {
  const val = document.getElementById("pwd").value;
  if (val === "21/08/2002") {
    renderLetter();
  } else {
    document.getElementById("error").innerText = "Wrong password 💛";
  }
}

function renderLetter() {
  const app = document.getElementById("app");

  app.innerHTML = `
    <div class="page-shell">
      <div class="letter-card">

        <h1 class="name">💌 For Kaviya 🌷</h1>

        <div class="section">
          <p class="greeting">${content.greeting}</p>
          <p>${content.intro}</p>
        </div>

        <div class="section">💫 ${content.spark}</div>
        <div class="section">🌸 ${content.meet}</div>
        <div class="section">😅 ${content.talk}</div>
        <div class="section">🥰 ${content.shy}</div>
        <div class="section">💖 ${content.promise}</div>
        <div class="section">🌱 ${content.learn}</div>

        <div class="friend-box">
          <p>${content.okay}</p>
          <p>${content.friend}</p>
          <p class="friend-q">💌 ${content.friendQ}</p>
        </div>

        <div class="blessing">
          <p>${content.blessing}</p>
          <p class="phone">📞 Jaya Murugan – 7904486739</p>
        </div>

      </div>
    </div>
  `;
}

renderLogin();

</script>
</body>
</html>
